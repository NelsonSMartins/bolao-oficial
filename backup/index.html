<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bolão Copa do Mundo - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }
        .trophy-icon {
            font-size: 4rem;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="card-header">
                <div class="trophy-icon">🏆</div>
                <h3 class="text-center">Bolão Copa do Mundo</h3>
                <p class="text-center mb-0">Faça login para continuar</p>
            </div>
            <div class="card-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="usuario">Usuário</label>
                        <input type="text" class="form-control" id="usuario" required autocomplete="off" placeholder="Digite seu usuário">
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" class="form-control" id="senha" required placeholder="Digite sua senha">
                    </div>
                    <button type="submit" class="btn btn-block">Entrar</button>
                </form>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/github.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
