<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Todos Palpites - Bolão 2026</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .palpite-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    .palpite-table th, .palpite-table td {
      padding: 8px 4px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .palpite-table th {
      background: var(--bg-page);
      font-weight: 600;
    }
    .game-name {
      font-weight: 600;
      text-align: left;
    }
    .result-badge {
      font-size: 0.65rem;
    }
    .horizontal-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="navbar">
      <div class="navbar-container">
        <a href="palpites.html" class="logo">🏆 <span>Bolão 2026</span></a>
        <div class="nav-links">
          <span class="user-name" id="userName"></span>
          <a href="palpites.html">📝</a>
          <a href="palpites_geral.html" class="active">👥</a>
          <a href="ranking.html">📊</a>
          <a href="#" onclick="logout()">🚪</a>
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="filter-bar" id="filterBar"></div>
      <div class="horizontal-scroll" id="palpitesContainer"></div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/github.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/palpites_geral.js"></script>
</body>
</html>
