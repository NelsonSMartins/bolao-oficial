<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Meus Palpites - Bolão Copa 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .palpite-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .palpite-jogo { font-weight: bold; flex: 1; }
        .palpite-valor { font-size: 1.2rem; font-weight: bold; color: #1a5f7a; }
        .resultado { font-size: 0.8rem; color: #666; margin-top: 5px; }
        .badge-acertou { background: #2e7d32; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .badge-errou { background: #d32f2f; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .badge-parcial { background: #ed6c02; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="navbar-container">
                <a href="meus_palpites.html" class="logo">🏆 <span>Bolão 2026</span></a>
                <div class="nav-links">
                    <span id="userName"></span>
                    <a href="meus_palpites.html" class="active">📝 Meus Palpites</a>
                    <a href="ranking.html">📊 Ranking</a>
                    <a href="#" onclick="logout()">Sair</a>
                </div>
            </div>
        </nav>

        <main class="container">
            <div class="card">
                <div class="card-header">📝 Meus Palpites</div>
                <div class="card-body" id="palpitesContainer"></div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/palpites.js"></script>
</body>
</html>
