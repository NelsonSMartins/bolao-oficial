<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Meus Palpites - Bolão Copa 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #1e293b;
        }
        .navbar {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.2rem; font-weight: bold; color: #1a5f7a; text-decoration: none; }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a {
            color: #64748b;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 20px;
        }
        .nav-links a.active { background: #1a5f7a; color: white; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-header { padding: 15px 20px; font-weight: bold; background: white; border-bottom: 1px solid #e2e8f0; }
        .card-body { padding: 20px; }
        .palpite-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .palpite-jogo { font-weight: bold; flex: 1; }
        .palpite-valor { font-size: 1.2rem; font-weight: bold; color: #1a5f7a; }
        .resultado { font-size: 0.75rem; color: #64748b; margin-top: 5px; }
        .badge-acertou { background: #2e7d32; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin-left: 8px; }
        .badge-parcial { background: #ed6c02; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin-left: 8px; }
        .badge-errou { background: #d32f2f; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin-left: 8px; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-container">
            <a href="meus_palpites.html" class="logo">🏆 Bolão 2026</a>
            <div class="nav-links">
                <span id="userName" style="font-weight: 600; color:#1a5f7a;"></span>
                <a href="meus_palpites.html" class="active">📝 Meus</a>
                <a href="ranking.html">📊 Ranking</a>
                <a href="#" onclick="logout()">🚪 Sair</a>
            </div>
        </div>
    </div>

    <main class="container">
        <div class="card">
            <div class="card-header">📝 Meus Palpites</div>
            <div class="card-body" id="palpitesContainer">
                <div class="loading">⏳ Carregando dados...</div>
            </div>
        </div>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'index.html';
        }

        function calcularPontos(palpite, resultado) {
            if (!palpite || !resultado) return 0;
            if (palpite.casa === resultado.casa && palpite.fora === resultado.fora) return 3;
            const palpiteVencedor = palpite.casa > palpite.fora ? 'casa' : (palpite.casa < palpite.fora ? 'fora' : 'empate');
            const resultadoVencedor = resultado.casa > resultado.fora ? 'casa' : (resultado.casa < resultado.fora ? 'fora' : 'empate');
            return palpiteVencedor === resultadoVencedor ? 1 : 0;
        }

        async function carregarPagina() {
            const usuario = localStorage.getItem('usuarioLogado');
            if (!usuario) {
                window.location.href = 'index.html';
                return;
            }
            const user = JSON.parse(usuario);
            document.getElementById('userName').innerHTML = user.nome;
            
            const dados = await lerDados();
            const container = document.getElementById('palpitesContainer');
            container.innerHTML = '';
            
            if (!dados.jogos || dados.jogos.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum jogo cadastrado ainda.</div>';
                return;
            }
            
            const jogosOrdenados = [...dados.jogos].sort((a,b) => (a.data || '').localeCompare(b.data || ''));
            
            for (const jogo of jogosOrdenados) {
                const palpiteKey = `${jogo.id}_${user.username}`;
                const palpite = dados.palpites[palpiteKey];
                const resultado = dados.resultados[jogo.id];
                
                const div = document.createElement('div');
                div.className = 'palpite-item';
                
                let statusHtml = '';
                if (palpite && resultado) {
                    const pontos = calcularPontos(palpite, resultado);
                    if (pontos === 3) statusHtml = '<span class="badge-acertou">🎯 +3 pontos</span>';
                    else if (pontos === 1) statusHtml = '<span class="badge-parcial">✅ +1 ponto</span>';
                    else statusHtml = '<span class="badge-errou">❌ 0 pontos</span>';
                } else if (resultado && !palpite) {
                    statusHtml = '<span class="badge-errou">⚠️ Não palpou</span>';
                } else if (palpite && !resultado) {
                    statusHtml = '<span class="badge-parcial">⏳ Aguardando</span>';
                } else {
                    statusHtml = '<span class="badge-errou">❌ Sem palpite</span>';
                }
                
                const dataFormatada = jogo.data ? jogo.data.split('-').reverse().join('/') : 'Data não definida';
                
                div.innerHTML = `
                    <div class="palpite-jogo">
                        ${jogo.timeCasa} 🆚 ${jogo.timeFora}
                        <div class="resultado">📅 ${dataFormatada}</div>
                        ${resultado ? `<div class="resultado">🏁 Resultado: ${resultado.casa} x ${resultado.fora}</div>` : ''}
                    </div>
                    <div class="palpite-valor">
                        ${palpite ? `${palpite.casa} x ${palpite.fora}` : '? x ?'}
                        ${statusHtml}
                    </div>
                `;
                container.appendChild(div);
            }
        }
        
        // Aguardar app.js carregar os dados
        setTimeout(carregarPagina, 500);
    </script>
</body>
</html>
