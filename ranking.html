<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ranking - Bolão Copa 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .ranking-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        .ranking-table th, .ranking-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .ranking-table th { background: #f5f5f5; }
        .pontos { font-weight: bold; color: #1a5f7a; font-size: 1.2rem; }
        .ranking-pos-1 { background: linear-gradient(135deg, #ffd70020, #ffed4e10); }
        .ranking-pos-2 { background: linear-gradient(135deg, #c0c0c020, #e0e0e010); }
        .ranking-pos-3 { background: linear-gradient(135deg, #cd7f3220, #e0a06010); }
    </style>
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="navbar-container">
                <a href="meus_palpites.html" class="logo">🏆 <span>Bolão 2026</span></a>
                <div class="nav-links">
                    <span id="userName"></span>
                    <a href="meus_palpites.html">📝 Meus Palpites</a>
                    <a href="ranking.html" class="active">📊 Ranking</a>
                    <a href="#" onclick="logout()">Sair</a>
                </div>
            </div>
        </nav>

        <main class="container">
            <div class="card">
                <div class="card-header">🏆 Ranking do Bolão</div>
                <div class="card-body" id="rankingContainer"></div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ranking.js"></script>
</body>
</html>
