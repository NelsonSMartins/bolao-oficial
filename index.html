<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bolão Copa 2026 - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a5f7a, #0d3b4f);
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        .login-icon { font-size: 3rem; margin-bottom: 20px; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #1a5f7a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">🏆</div>
            <h2>Bolão Copa 2026</h2>
            <p>Faça login para continuar</p>
            <form id="loginForm">
                <input type="text" id="usuario" placeholder="Usuário" required>
                <input type="password" id="senha" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/database.js"></script>
</body>
</html>
