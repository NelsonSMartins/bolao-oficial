<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin - Bolão Copa 2026</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .form-group {
      margin-bottom: var(--space-md);
    }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
    }
    .alert {
      padding: var(--space-md);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-md);
    }
    .alert-info {
      background: #e3f2fd;
      color: #0288d1;
    }
    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .alert-warning {
      background: #fff3e0;
      color: #ed6c02;
    }
    .mb-3 {
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="navbar">
      <div class="navbar-container">
        <a href="admin.html" class="logo">👑 <span>Admin Bolão</span></a>
        <div class="nav-links">
          <a href="#" onclick="logout()">🚪 Sair</a>
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="card">
        <div class="card-header">
          <h2>Painel Administrativo</h2>
        </div>
        <div class="card-body">
          <div class="admin-tabs">
            <button class="admin-tab active" onclick="showTab('jogos')">📋 Jogos</button>
            <button class="admin-tab" onclick="showTab('resultados')">🎯 Resultados</button>
            <button class="admin-tab" onclick="showTab('participantes')">👥 Participantes</button>
            <button class="admin-tab" onclick="showTab('importar')">📎 Importar</button>
          </div>

          <!-- Tab Jogos -->
          <div id="tab-jogos" class="tab-pane active">
            <div class="add-game-form">
              <div class="form-group" style="flex: 2;">
                <label>Time da Casa</label>
                <input type="text" id="timeCasa" placeholder="Ex: Brasil">
              </div>
              <div class="form-group" style="flex: 2;">
                <label>Time Visitante</label>
                <input type="text" id="timeFora" placeholder="Ex: Argentina">
              </div>
              <div class="form-group" style="flex: 1;">
                <label>Data do Jogo</label>
                <input type="date" id="dataJogo" value="2026-06-11">
              </div>
              <div class="form-group" style="flex: 0;">
                <button class="btn-primary" onclick="adicionarJogo()" style="margin-top: 22px;">➕ Adicionar</button>
              </div>
            </div>
            <h3 style="margin: 20px 0 12px 0; font-size: 1rem;">Jogos Cadastrados</h3>
            <div id="listaJogos"></div>
          </div>

          <!-- Tab Resultados -->
          <div id="tab-resultados" class="tab-pane">
            <div id="resultadosJogos"></div>
            <button class="btn-success" onclick="salvarResultados()" style="margin-top: 20px;">💾 Salvar Resultados</button>
          </div>

          <!-- Tab Participantes -->
          <div id="tab-participantes" class="tab-pane">
            <div id="listaParticipantes"></div>
          </div>

          <!-- Tab Importar -->
          <div id="tab-importar" class="tab-pane">
            <div class="alert alert-info">
              📄 Formato esperado do Excel: Colunas "Participante", "Jogo", "Gols Casa", "Gols Fora"
            </div>
            <input type="file" id="excelFile" accept=".xlsx, .xls" style="margin-bottom: 16px; display: block;">
            <button class="btn-primary" onclick="importarExcel()">📂 Importar</button>
            <div id="importResult"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/github.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
