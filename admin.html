<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin - Bolão Copa 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #1e293b;
        }
        .navbar {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.2rem; font-weight: bold; color: #1a5f7a; text-decoration: none; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-header { padding: 15px 20px; font-weight: bold; border-bottom: 1px solid #e2e8f0; }
        .card-body { padding: 20px; }
        .btn-primary, .btn-success { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #1a5f7a; color: white; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-block { width: 100%; margin-top: 10px; }
        .alert {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .jogo-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .loading { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-container">
            <a href="admin.html" class="logo">👑 Admin Bolão</a>
            <button class="btn-primary" onclick="logout()" style="padding: 8px 16px;">Sair</button>
        </div>
    </div>

    <main class="container">
        <div class="alert">
            📌 <strong>Como atualizar os dados:</strong><br>
            1. Coloque os arquivos <strong>apostas.xlsx</strong> e <strong>resultados.xlsx</strong> na pasta <strong>/dados/</strong><br>
            2. Execute: <code>git add . && git commit -m "Atualiza dados" && git push</code><br>
            3. A Vercel fará o deploy automático
        </div>

        <div class="card">
            <div class="card-header">📋 Jogos Cadastrados</div>
            <div class="card-body" id="jogosContainer">
                <div class="loading">⏳ Carregando...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">📝 Status das Apostas</div>
            <div class="card-body" id="statusContainer">
                <div class="loading">⏳ Carregando...</div>
            </div>
        </div>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'index.html';
        }

        async function carregarPagina() {
            const usuario = localStorage.getItem('usuarioLogado');
            if (!usuario || JSON.parse(usuario).username !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            
            const dados = await lerDados();
            
            // Jogos
            const jogosContainer = document.getElementById('jogosContainer');
            if (dados.jogos.length === 0) {
                jogosContainer.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum jogo cadastrado</div>';
            } else {
                jogosContainer.innerHTML = '';
                dados.jogos.forEach(jogo => {
                    const div = document.createElement('div');
                    div.className = 'jogo-item';
                    div.innerHTML = `
                        <div>
                            <strong>${jogo.timeCasa} 🆚 ${jogo.timeFora}</strong>
                            <div style="font-size:0.75rem; color:#666;">📅 ${jogo.data || 'Data não definida'}</div>
                            ${dados.resultados[jogo.id] ? `<div style="font-size:0.75rem; color:#2e7d32;">🏁 Resultado: ${dados.resultados[jogo.id].casa} x ${dados.resultados[jogo.id].fora}</div>` : ''}
                        </div>
                    `;
                    jogosContainer.appendChild(div);
                });
            }
            
            // Status
            const statusContainer = document.getElementById('statusContainer');
            const totalApostas = Object.keys(dados.palpites).length;
            const totalJogadores = Object.keys(USUARIOS).filter(u => u !== 'admin').length;
            statusContainer.innerHTML = `
                <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                    <div style="background: #f8fafc; padding: 15px; border-radius: 12px; flex: 1; text-align: center;">
                        <div style="font-size: 2rem;">📋</div>
                        <div style="font-weight: bold;">${dados.jogos.length}</div>
                        <div style="font-size: 0.75rem;">Jogos</div>
                    </div>
                    <div style="background: #f8fafc; padding: 15px; border-radius: 12px; flex: 1; text-align: center;">
                        <div style="font-size: 2rem;">📝</div>
                        <div style="font-weight: bold;">${totalApostas}</div>
                        <div style="font-size: 0.75rem;">Apostas</div>
                    </div>
                    <div style="background: #f8fafc; padding: 15px; border-radius: 12px; flex: 1; text-align: center;">
                        <div style="font-size: 2rem;">👥</div>
                        <div style="font-weight: bold;">${totalJogadores}</div>
                        <div style="font-size: 0.75rem;">Jogadores</div>
                    </div>
                </div>
            `;
        }
        
        setTimeout(carregarPagina, 500);
    </script>
</body>
</html>
