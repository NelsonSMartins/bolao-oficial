<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin - Bolão Copa 2026</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-tabs {
      display: flex;
      gap: var(--space-sm);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
    }
    .admin-tab {
      padding: var(--space-sm) var(--space-lg);
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .admin-tab.active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
    }
    .tab-pane {
      display: none;
    }
    .tab-pane.active {
      display: block;
    }
    .result-row {
      display: flex;
      gap: var(--space-sm);
      align-items: center;
      margin-bottom: var(--space-sm);
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="navbar">
      <div class="navbar-container">
        <a href="admin.html" class="logo">👑 <span>Admin Bolão</span></a>
        <div class="nav-links">
          <a href="#" onclick="logout()">🚪 Sair</a>
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="card">
        <div class="card-header">
          <h2>Painel Administrativo</h2>
        </div>
        <div class="card-body">
          <div class="admin-tabs">
            <button class="admin-tab active" onclick="showTab('jogos')">📋 Gerenciar Jogos</button>
            <button class="admin-tab" onclick="showTab('resultados')">🎯 Resultados</button>
            <button class="admin-tab" onclick="showTab('participantes')">👥 Participantes</button>
            <button class="admin-tab" onclick="showTab('importar')">📎 Importar</button>
          </div>

          <!-- Tab Jogos -->
          <div id="tab-jogos" class="tab-pane active">
            <div style="display: flex; gap: var(--space-sm); margin-bottom: var(--space-lg); flex-wrap: wrap;">
              <input type="text" id="timeCasa" placeholder="Time Casa" style="flex:1; padding: var(--space-sm); border: 1px solid var(--border); border-radius: var(--radius-sm);">
              <span>vs</span>
              <input type="text" id="timeFora" placeholder="Time Visitante" style="flex:1; padding: var(--space-sm); border: 1px solid var(--border); border-radius: var(--radius-sm);">
              <button class="btn btn-primary" onclick="adicionarJogo()">+ Adicionar</button>
            </div>
            <div id="listaJogos"></div>
          </div>

          <!-- Tab Resultados -->
          <div id="tab-resultados" class="tab-pane">
            <div id="resultadosJogos"></div>
            <button class="btn btn-success" onclick="salvarResultados()" style="margin-top: var(--space-lg);">💾 Salvar Resultados</button>
          </div>

          <!-- Tab Participantes -->
          <div id="tab-participantes" class="tab-pane">
            <div style="margin-bottom: var(--space-md); display: flex; gap: var(--space-sm);">
              <button class="btn btn-warning" onclick="liberarTodos()">🔓 Liberar Todos</button>
              <button class="btn btn-danger" onclick="limparTodosPalpites()">🗑️ Limpar Todos Palpites</button>
            </div>
            <div id="listaParticipantes"></div>
          </div>

          <!-- Tab Importar -->
          <div id="tab-importar" class="tab-pane">
            <p>Formato: Participante, Jogo, Gols Casa, Gols Fora</p>
            <input type="file" id="excelFile" accept=".xlsx, .xls" style="margin-bottom: var(--space-md);">
            <button class="btn btn-primary" onclick="importarExcel()">📂 Importar</button>
            <div id="importResult"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/github.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
