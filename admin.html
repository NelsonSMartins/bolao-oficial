<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gerar Dados</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        textarea {
            width: 100%;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            background: #16213e;
            color: #eee;
            border: 1px solid #0f3460;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 20px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .card {
            background: #0f3460;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        h2 { margin-bottom: 15px; color: #e94560; }
        hr { margin: 15px 0; border-color: #0f3460; }
        .exemplo {
            background: #16213e;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 Admin - Gerador de Dados</h1>
        <p style="margin-bottom: 20px;">Preencha os campos abaixo e clique em "Gerar" para criar o código para copiar para os arquivos</p>

        <div class="card">
            <h2>📝 1. Jogos</h2>
            <div class="exemplo">Exemplo: Brasil, Marrocos, 2026-06-11</div>
            <textarea id="jogosInput" rows="8" placeholder="Digite os jogos no formato: Time Casa, Time Fora, Data
Brasil, Marrocos, 2026-06-11
México, Canadá, 2026-06-11
Argentina, França, 2026-06-12"></textarea>
            <button onclick="gerarJogos()">Gerar Código dos Jogos</button>
            <div id="jogosOutput" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h2>📝 2. Resultados</h2>
            <div class="exemplo">Exemplo: Brasil, 2, Marrocos, 0</div>
            <textarea id="resultadosInput" rows="5" placeholder="Digite os resultados no formato: Time Casa, Gols Casa, Time Fora, Gols Fora
Brasil, 2, Marrocos, 0
México, 1, Canadá, 1"></textarea>
            <button onclick="gerarResultados()">Gerar Código dos Resultados</button>
            <div id="resultadosOutput" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h2>📝 3. Apostas</h2>
            <div class="exemplo">Exemplo: Nelson, Brasil, 2, Marrocos, 0</div>
            <textarea id="apostasInput" rows="10" placeholder="Digite as apostas no formato: Jogador, Time Casa, Gols Casa, Time Fora, Gols Fora
Nelson, Brasil, 2, Marrocos, 0
Douglas, Brasil, 1, Marrocos, 0
Alcy, Brasil, 2, Marrocos, 1"></textarea>
            <button onclick="gerarApostas()">Gerar Código das Apostas</button>
            <div id="apostasOutput" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        // Mapeamento de times para IDs
        let jogosMap = {};

        function gerarJogos() {
            const texto = document.getElementById('jogosInput').value;
            const linhas = texto.split('\n').filter(l => l.trim());
            let jogos = [];
            let id = 1;
            
            linhas.forEach(linha => {
                const partes = linha.split(',').map(p => p.trim());
                if (partes.length >= 3) {
                    jogos.push({
                        id: id++,
                        timeCasa: partes[0],
                        timeFora: partes[1],
                        data: partes[2]
                    });
                }
            });
            
            const codigo = `const JOGOS = ${JSON.stringify(jogos, null, 4)};`;
            document.getElementById('jogosOutput').innerHTML = `<textarea rows="10" style="width:100%;">${codigo}</textarea>`;
        }

        function gerarResultados() {
            const texto = document.getElementById('resultadosInput').value;
            const linhas = texto.split('\n').filter(l => l.trim());
            let resultados = {};
            
            linhas.forEach(linha => {
                const partes = linha.split(',').map(p => p.trim());
                if (partes.length >= 4) {
                    const timeCasa = partes[0];
                    const golsCasa = parseInt(partes[1]);
                    const timeFora = partes[2];
                    const golsFora = parseInt(partes[3]);
                    
                    // Encontrar o jogo
                    const jogo = JOGOS.find(j => j.timeCasa === timeCasa && j.timeFora === timeFora);
                    if (jogo) {
                        resultados[jogo.id] = { casa: golsCasa, fora: golsFora };
                    }
                }
            });
            
            const codigo = `const RESULTADOS = ${JSON.stringify(resultados, null, 4)};`;
            document.getElementById('resultadosOutput').innerHTML = `<textarea rows="10" style="width:100%;">${codigo}</textarea>`;
        }

        function gerarApostas() {
            const texto = document.getElementById('apostasInput').value;
            const linhas = texto.split('\n').filter(l => l.trim());
            let apostas = {};
            
            linhas.forEach(linha => {
                const partes = linha.split(',').map(p => p.trim());
                if (partes.length >= 5) {
                    const jogador = partes[0];
                    const timeCasa = partes[1];
                    const golsCasa = parseInt(partes[2]);
                    const timeFora = partes[3];
                    const golsFora = parseInt(partes[4]);
                    
                    // Encontrar o jogo
                    const jogo = JOGOS.find(j => j.timeCasa === timeCasa && j.timeFora === timeFora);
                    if (jogo) {
                        const key = `${jogo.id}_${jogador}`;
                        apostas[key] = { casa: golsCasa, fora: golsFora };
                    }
                }
            });
            
            const codigo = `const APOSTAS = ${JSON.stringify(apostas, null, 4)};`;
            document.getElementById('apostasOutput').innerHTML = `<textarea rows="10" style="width:100%;">${codigo}</textarea>`;
        }
    </script>
</body>
</html>
