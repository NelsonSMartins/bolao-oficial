<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin - Bolão Copa 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container { max-width: 800px; margin: 0 auto; }
        .stat-cards { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; flex: 1; text-align: center; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .jogo-item, .resultado-item, .palpite-form-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .palpite-form-item { flex-direction: column; align-items: stretch; }
        .palpite-form-jogo { font-weight: bold; }
        .palpite-form-inputs { display: flex; gap: 10px; align-items: center; justify-content: center; }
        .resultado-jogo { font-weight: bold; flex: 1; }
        .resultado-inputs { display: flex; gap: 10px; align-items: center; }
        .select-full { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; background: white; border: none; border-radius: 10px; cursor: pointer; }
        .tab.active { background: #1a5f7a; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-block { width: 100%; margin-top: 10px; }
        .small { font-size: 0.75rem; color: #666; margin-top: 4px; }
        .success { color: #2e7d32; }
        .ranking-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        .ranking-table th, .ranking-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .ranking-table th { background: #f5f5f5; }
        .pontos { font-weight: bold; color: #1a5f7a; font-size: 1.2rem; }
        .backup-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="navbar-container">
                <a href="admin.html" class="logo">👑 <span>Admin Bolão</span></a>
                <div class="nav-links">
                    <span id="userName"></span>
                    <a href="#" onclick="logout()">Sair</a>
                </div>
            </div>
        </nav>

        <main class="container admin-container">
            <div class="backup-buttons">
                <button class="btn-outline" onclick="exportarBackup()">📤 Exportar Backup</button>
                <input type="file" id="importFile" accept=".json" style="display:none">
                <button class="btn-outline" onclick="document.getElementById('importFile').click()">📥 Importar Backup</button>
            </div>

            <div class="stat-cards" id="stats"></div>

            <div class="tabs">
                <button class="tab active" data-tab="jogos">📋 Jogos</button>
                <button class="tab" data-tab="palpites">📝 Palpites</button>
                <button class="tab" data-tab="resultados">🎯 Resultados</button>
                <button class="tab" data-tab="ranking">🏆 Ranking</button>
            </div>

            <div id="tab-jogos" class="tab-content active">
                <div class="card">
                    <div class="card-header">➕ Novo Jogo</div>
                    <div class="card-body">
                        <input type="text" id="timeCasa" placeholder="Time da Casa" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
                        <input type="text" id="timeFora" placeholder="Time Visitante" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
                        <input type="date" id="dataJogo" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
                        <button class="btn-primary btn-block" onclick="adicionarJogo()">Adicionar Jogo</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">📋 Jogos Cadastrados</div>
                    <div class="card-body" id="listaJogos"></div>
                </div>
            </div>

            <div id="tab-palpites" class="tab-content">
                <div class="card">
                    <div class="card-header">📝 Inserir Palpites</div>
                    <div class="card-body" id="formPalpites"></div>
                </div>
            </div>

            <div id="tab-resultados" class="tab-content">
                <div class="card">
                    <div class="card-header">🎯 Resultados dos Jogos</div>
                    <div class="card-body" id="formResultados"></div>
                </div>
            </div>

            <div id="tab-ranking" class="tab-content">
                <div class="card">
                    <div class="card-header">🏆 Ranking Geral</div>
                    <div class="card-body" id="rankingAdmin"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // Sistema de abas
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`tab-${tabId}`).classList.add('active');
            });
        });
        
        document.getElementById('importFile').addEventListener('change', function(e) {
            if (e.target.files[0]) importarArquivo(e.target.files[0]);
        });
    </script>
</body>
</html>
